name: Strategy Report

on:
  schedule:
    # 北京时间 10:06 → UTC 02:06
    - cron: '6 2 * * *'
    # 北京时间 每月6日 06:16 → UTC 5日 22:16
    - cron: '16 22 5 * *'
  workflow_dispatch:

jobs:
  # ────────── 每日邮件推送 ──────────
  send-report:
    if: github.event_name != 'schedule' || github.event.schedule == '6 2 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Fetch & send report
        run: python main.py
        env:
          MAILEROO_API_KEY: ${{ secrets.MAILEROO_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}

  # ────────── 每月维护报告 ──────────
  maintenance:
    if: github.event_name == 'schedule' && github.event.schedule == '16 22 5 * *'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate maintenance report
        run: python maintenance.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "chore: maintenance report $(date -u +%Y-%m-%d)"
          git push
